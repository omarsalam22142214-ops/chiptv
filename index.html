<html lang="ar" dir="rtl">
<html lang="ar" dir="rtl"><head>

    <style>
        body {
            background-color: #0f0f0f; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center;
            align-items: flex-start; min-height: 100vh; box-sizing: border-box;
        }
        .app-container {
            display: flex; flex-direction: column; width: 100%; max-width: 1200px; gap: 20px;
        }
        .main-content {
            display: flex; background: #1a1a1a; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9); overflow: hidden; border: 1px solid #333;
        }
        
        /* المشغل */
        .player-section { flex: 2; padding: 20px; display: flex; flex-direction: column; }
        .player-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;
        }
        .player-header h1 { margin: 0; font-size: 24px; color: #e50914; }
        .now-playing { color: #4caf50; font-size: 16px; font-weight: bold; }
        
        /* أزرار التحكم العلوية للمشغل */
        .top-controls {
            display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px;
        }
        .btn-action {
            background: #2a2a2a; border: 1px solid #444; color: white; 
            padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.3s;
        }
        .btn-action:hover { background: #444; }
        .btn-close:hover { background: #f44336; border-color: #f44336; }
        .btn-refresh:hover { background: #2196F3; border-color: #2196F3; }

        video {
            width: 100%; border-radius: 8px; background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); aspect-ratio: 16/9; outline: none;
        }
        
        /* القائمة */
        .playlist-section {
            flex: 1; background: #222; border-right: 1px solid #333;
            display: flex; flex-direction: column; max-height: 600px;
        }
        .playlist-header {
            padding: 15px; background: #2a2a2a; margin: 0;
            font-size: 16px; border-bottom: 1px solid #333; text-align: center;
            display: flex; justify-content: space-between; align-items: center;
        }
        .channel-count { font-size: 12px; background: #e50914; padding: 3px 8px; border-radius: 10px;}
        .channel-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; }
        .channel-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; border-bottom: 1px solid #333; transition: background 0.3s;
        }
        .channel-item:hover { background: #333; }
        .channel-item.active { background: rgba(229, 9, 20, 0.2); border-right: 4px solid #e50914; }
        
        .channel-info { display: flex; align-items: center; cursor: pointer; flex: 1; overflow: hidden;}
        .channel-logo { width: 40px; height: 40px; border-radius: 5px; margin-left: 10px; object-fit: contain; background: #111; }
        .channel-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .channel-actions button {
            background: none; border: none; cursor: pointer; color: #ccc;
            font-size: 14px; margin-right: 5px; padding: 5px; border-radius: 4px;
        }
        .btn-delete:hover { color: #f44336; background: rgba(244, 67, 54, 0.1); }

        /* لوحة التحكم والإضافة */
        .admin-panel {
            background: #1a1a1a; padding: 20px; border-radius: 12px;
            border: 1px solid #333; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between;
        }
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }
        .admin-panel input[type="text"] {
            flex: 1; min-width: 150px; padding: 10px; border-radius: 6px;
            border: 1px solid #444; background: #111; color: white; outline: none;
        }
        .admin-panel input[type="text"]:focus { border-color: #e50914; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-add { background: #e50914; }
        .btn-add:hover { background: #b20710; }
        .btn-upload { background: #4caf50; display: flex; align-items: center; gap: 5px; white-space: nowrap;}
        .btn-upload:hover { background: #388e3c; }
        .btn-export { background: #ff9800; display: flex; align-items: center; gap: 5px; white-space: nowrap; color: #fff;}
        .btn-export:hover { background: #f57c00; }
        .btn-delete-all { background: #f44336; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .btn-delete-all:hover { background: #d32f2f; }
        .upload-wrapper { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .playlist-section { border-right: none; border-top: 1px solid #333; max-height: 400px;}
            .admin-panel { flex-direction: column; align-items: stretch; }
            .form-group { flex-direction: column; }
            .upload-wrapper { width: 100%; justify-content: space-between; }
        }
    </style>
</head>

        // دالة فك شفرة ملفات الـ M3U
        function parseM3UString(content) {
            const lines = content.split('\n');
            let parsedChannels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    let nameMatch = line.match(/,(.+)$/);
                    let logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.name = nameMatch ? nameMatch[1].trim() : 'قناة بدون اسم';
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';
                } else if (line !== '' && !line.startsWith('#')) {
                    currentChannel.url = line;
                    parsedChannels.push(currentChannel);
                    currentChannel = {}; 
                }
            }
            return parsedChannels;
        }

        // دالة رسم القنوات في القائمة
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            channelCountText.innerText = channels.length + " قناة";
            
            if (channels.length === 0) {
                playlistContainer.innerHTML = '<li style="padding: 20px; text-align: center; color: #777;">القائمة فاضية! ضيف قنوات أو استورد ملف M3U.</li>';
                return;
            }

            channels.forEach((channel, index) => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                const logoSrc = channel.logo ? channel.logo : 'https://via.placeholder.com/40/111/fff?text=TV';

                li.innerHTML = `
                    <div class="channel-info" onclick="playChannel('${channel.url}', '${channel.name}', this)">
                        <img src="${logoSrc}" class="channel-logo" alt="logo" onerror="this.src='https://via.placeholder.com/40/111/fff?text=TV'">
                        <span class="channel-name">${channel.name}</span>
                    </div>
                    <div class="channel-actions">
                        <button class="btn-delete" title="مسح من القايمة" onclick="deleteChannel(${index}, event)">🗑️</button>
                    </div>
                `;
                playlistContainer.appendChild(li);
            });
        }

        // دالة التشغيل
        function playChannel(url, name, element) {
            activeStreamUrl = url;
            activeStreamName = name;
            activeElementRef = element;

            currentChannelText.innerText = "● جاري تشغيل: " + name;
            
            document.querySelectorAll('.channel-item').forEach(item => item.classList.remove('active'));
            if (element) {
                element.parentElement.classList.add('active');
            }

            let streamUrl = url;
            if (streamUrl.includes('.ts')) {
                streamUrl = streamUrl.replace('.ts', '.m3u8');
            } else if (!streamUrl.includes('.m3u8')) {
                streamUrl += ".m3u8";
            }

            if (hls) { hls.destroy(); }

            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    manifestLoadingTimeOut: 10000,
                    manifestLoadingMaxRetry: 3,
                });
                
                hls.loadSource(streamUrl);
                hls.attachMedia(videoElement);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoElement.play().catch(e => console.log("تحذير التشغيل:", e));
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                currentChannelText.innerText = "❌ البث لا يعمل (تأكد من الرابط أو سياسة السيرفر)";
                                break;
                        }
                    }
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = streamUrl;
                videoElement.play().catch(e => console.log("تحذير التشغيل:", e));
            }
        }

        function refreshPlayer() {
            if (activeStreamUrl && activeStreamName) {
                playChannel(activeStreamUrl, activeStreamName, activeElementRef);
            } else {
                alert("مفيش قناة شغالة عشان تعملها ريفريش!");
            }
        }

        function closePlayer() {
            if (hls) { hls.destroy(); }
            videoElement.pause();
            videoElement.removeAttribute('src');
            videoElement.load();
            currentChannelText.innerText = "اختر قناة للتشغيل...";
            document.querySelectorAll('.channel-item').forEach(item => item.classList.remove('active'));
            activeStreamUrl = '';
            activeStreamName = '';
            activeElementRef = null;
        }

        function addSingleChannel() {
            const name = inputName.value.trim();
            const url = inputUrl.value.trim();
            const logo = inputLogo.value.trim();

            if (!name || !url) {
                alert("لازم تكتب اسم القناة واللينك بتاعها على الأقل!");
                return;
            }

            channels.unshift({ name, url, logo }); 
            saveChannelsToStorage();
            renderPlaylist();

            inputName.value = '';
            inputUrl.value = '';
            inputLogo.value = '';
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                const newChannels = parseM3UString(content);
                channels = newChannels.concat(channels);
                saveChannelsToStorage();
                renderPlaylist();
                alert(`تم إضافة وحفظ ${newChannels.length} قناة بنجاح! 🎉`);
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function deleteChannel(index, event) {
            event.stopPropagation(); 
            channels.splice(index, 1);
            saveChannelsToStorage();
            renderPlaylist();
        }

        function deleteAllChannels() {
            if (channels.length === 0) {
                alert("القائمة فاضية بالفعل!");
                return;
            }
            if (confirm("متأكد إنك عايز تمسح كل القنوات المحفوظة؟")) {
                channels = [];
                saveChannelsToStorage();
                renderPlaylist();
                closePlayer(); 
            }
        }

        // =====================================
        // 🔥 دالة تصدير المشغل كملف HTML مستقل
        // =====================================
        function exportToHTML() {
            if (channels.length === 0) {
                alert("مفيش قنوات عشان تحفظها!");
                return;
            }

            // بناخد نسخة من كود الصفحة بالكامل
            const clonedDoc = document.documentElement.cloneNode(true);

            // بننضف النسخة دي عشان تفتح عند صاحبك كأنها جديدة
            clonedDoc.querySelector('#playlist').innerHTML = '';
            clonedDoc.querySelector('#current-channel-name').innerText = 'اختر قناة للتشغيل...';
            clonedDoc.querySelector('#channel-count').innerText = '0 قناة';
            
            const video = clonedDoc.querySelector('#video');
            video.removeAttribute('src');
            
            // بنفضي الخانات بتاعة الإضافة
            ['#input-name', '#input-url', '#input-logo'].forEach(id => {
                const el = clonedDoc.querySelector(id);
                if(el) el.removeAttribute('value');
            });

            let htmlStr = clonedDoc.outerHTML;

            // بنحول مصفوفة القنوات لنص، وبنحقنها جوه الكود مكان العلامة السحرية
            const channelsJson = JSON.stringify(channels);
            htmlStr = htmlStr.replace(/\/\*\[INJECT_CHANNELS\]\*\/[\s\S]*?\/\*\[\/INJECT_CHANNELS\]\*\//, `/*[INJECT_CHANNELS]*/${channelsJson}/*[/INJECT_CHANNELS]*/`);

            const fullHtml = `<!DOCTYPE html>\n<html lang="ar" dir="rtl">\n${htmlStr}\n</html>`;

            // بنعمل الملف وبنزله
            const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'X-Stream_Player_With_Channels.html';
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // تشغيل الرسم أول ما الصفحة تفتح
        renderPlaylist();

    </script>
