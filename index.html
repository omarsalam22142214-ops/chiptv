<!DOCTYPE html>
<html lang="ar" dir="rtl">
<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Stream - Advanced Player</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-panel: #151b2b;
            --bg-hover: #1e263c;
            --accent: #00d2ff;
            --accent-hover: #00a3cc;
            --text-main: #f0f4f8;
            --text-muted: #8b9eb0;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1300px;
            gap: 20px;
        }

        /* لوحة التحكم */
        .controls-panel {
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }

        .controls-panel input {
            flex: 1; min-width: 140px; padding: 12px; border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2);
            color: white; outline: none; transition: 0.3s;
        }

        .controls-panel input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(0, 210, 255, 0.3); }

        .action-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }

        .btn {
            padding: 12px 18px; border: none; border-radius: 8px; color: white;
            font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            font-size: 14px; display: flex; align-items: center; gap: 6px;
        }

        .btn:active { transform: scale(0.96); }
        .btn-add { background: var(--accent); color: #000; }
        .btn-add:hover { background: var(--accent-hover); }
        .btn-upload { background: var(--success); color: #000;}
        .btn-upload:hover { background: #26b361; }
        .btn-export { background: var(--warning); color: #000;}
        .btn-export:hover { background: #e09200; }
        .btn-clear { background: var(--danger); }
        .btn-clear:hover { background: #e03e4d; }

        /* منطقة المشغل والقائمة */
        .content-area { display: flex; gap: 20px; height: calc(100vh - 160px); min-height: 500px; }

        /* القائمة الجانبية */
        .sidebar {
            flex: 1; background: var(--bg-panel); border-radius: 16px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); max-width: 350px;
        }

        .sidebar-header {
            padding: 18px; background: rgba(0, 0, 0, 0.2); font-size: 18px;
            font-weight: bold; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge {
            font-size: 12px; background: var(--accent); color: #000;
            padding: 4px 10px; border-radius: 12px; font-weight: bold;
        }

        .channel-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

        .channel-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s; cursor: pointer;
        }

        .channel-item:hover { background: var(--bg-hover); }
        .channel-item.playing { background: rgba(0, 210, 255, 0.1); border-right: 4px solid var(--accent); }

        .channel-info { display: flex; align-items: center; flex: 1; overflow: hidden; }
        .channel-thumb { width: 45px; height: 45px; border-radius: 8px; margin-left: 12px; object-fit: cover; background: #000; }
        .channel-name { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }

        .btn-delete { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; transition: 0.3s; padding: 5px; }
        .btn-delete:hover { color: var(--danger); transform: scale(1.1); }

        /* منطقة الفيديو */
        .video-container {
            flex: 2.5; background: var(--bg-panel); border-radius: 16px; padding: 20px;
            display: flex; flex-direction: column; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .now-playing-title { font-size: 20px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .player-actions { display: flex; gap: 10px; }

        .btn-icon {
            background: rgba(255, 255, 255, 0.1); border: none; color: white;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .btn-icon:hover { background: rgba(255, 255, 255, 0.2); }

        .player-wrapper {
            flex: 1; border-radius: 12px; overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .plyr { width: 100%; height: 100%; --plyr-color-main: var(--accent); }

        @media (max-width: 992px) {
            .content-area { flex-direction: column-reverse; height: auto; }
            .sidebar { max-width: 100%; height: 400px; }
            .controls-panel { flex-direction: column; align-items: stretch; }
            .action-btns { justify-content: space-between; }
        }
    </style>
</head>

    <div class="app-wrapper">
        <div class="controls-panel">
            <div class="input-group">
                <input type="text" id="i-name" placeholder="اسم القناة">
                <input type="text" id="i-url" placeholder="رابط البث (m3u8/ts)">
                <input type="text" id="i-logo" placeholder="رابط اللوجو (اختياري)">
                <button class="btn btn-add" onclick="addChannel()">➕ إضافة</button>
            </div>
            
            <div class="action-btns">
                <input type="file" id="file-upload" accept=".m3u,.m3u8,.txt" style="display: none;" onchange="importM3U(event)">
                <button class="btn btn-upload" onclick="document.getElementById('file-upload').click()">📁 استيراد</button>
                <button class="btn btn-export" onclick="exportHTML()">💾 تصدير HTML</button>
                <button class="btn btn-clear" onclick="clearAll()">🗑 مسح الكل</button>
            </div>
        </div>

        <div class="content-area">
            <div class="sidebar">
                <div class="sidebar-header">
                    <span>القنوات</span>
                    <span class="badge" id="ch-count">0</span>
                </div>
                <ul class="channel-list" id="ch-list"></ul>
            </div>

            <div class="video-container">
                <div class="video-header">
                    <div class="now-playing-title" id="np-title">
                        📺 <span>لم يتم اختيار قناة</span>
                    </div>
                    <div class="player-actions">
                        <button class="btn-icon" onclick="reloadStream()" title="تحديث البث">🔄</button>
                        <button class="btn-icon" onclick="stopStream()" title="إيقاف">🛑</button>
                    </div>
                </div>

                <div class="player-wrapper" id="player-wrapper"><video id="video-player" controls="" playsinline="" preload="auto"></video></div>
            </div>
        </div>
    </div>

        function initPlayer() {
            const videoElement = document.getElementById('video-player');
            plyrInstance = new Plyr(videoElement, {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                ratio: '16:9'
            });
        }

        initPlayer();

        function saveData() {
            localStorage.setItem('iptv_saved_channels', JSON.stringify(channels));
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            let result = [];
            let temp = {};

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    let nameMatch = line.match(/,(.+)$/);
                    let logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    temp.name = nameMatch ? nameMatch[1].trim() : 'قناة غير معروفة';
                    temp.logo = logoMatch ? logoMatch[1] : '';
                } else if (line && !line.startsWith('#')) {
                    temp.url = line;
                    result.push(temp);
                    temp = {}; 
                }
            }
            return result;
        }

                li.innerHTML = `

            });
        }

        function play(url, name, element) {
            currentUrl = url;
            currentName = name;
            domTitle.innerText = name;
            
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('playing'));
            if (element) element.parentElement.classList.add('playing');

            let streamUrl = url;
            if (streamUrl.includes('.ts')) {
                streamUrl = streamUrl.replace('.ts', '.m3u8');
            } else if (!streamUrl.includes('.m3u8')) {
                streamUrl += ".m3u8";
            }

            const videoElement = document.getElementById('video-player');

            if (hlsInstance) {
                hlsInstance.destroy();
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    manifestLoadingTimeOut: 10000,
                    manifestLoadingMaxRetry: 3,
                });
                
                hlsInstance.loadSource(streamUrl);
                hlsInstance.attachMedia(videoElement);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    const playPromise = videoElement.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(e => console.log("تنبيه التشغيل:", e));
                    }
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hlsInstance.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsInstance.recoverMediaError();
                                break;
                            default:
                                hlsInstance.destroy();
                                domTitle.innerText = "❌ البث متوقف حالياً";
                                break;
                        }
                    }
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = streamUrl;
                videoElement.play();
            }
        }

        function reloadStream() {
            if (currentUrl) {
                const playingEl = document.querySelector('.channel-item.playing .channel-info');
                play(currentUrl, currentName, playingEl);
            }
        }

        function stopStream() {
            if (hlsInstance) hlsInstance.destroy();
            const videoElement = document.getElementById('video-player');
            videoElement.pause();
            videoElement.removeAttribute('src');
            videoElement.load();
            domTitle.innerText = "لم يتم اختيار قناة";
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('playing'));
            currentUrl = '';
        }

        function addChannel() {
            const name = iName.value.trim();
            const url = iUrl.value.trim();
            const logo = iLogo.value.trim();

            if (!name || !url) {
                alert("يجب إدخال الاسم والرابط!");
                return;
            }

            channels.unshift({ name, url, logo });
            saveData();
            render();

            iName.value = ''; iUrl.value = ''; iLogo.value = '';
        }

        function importM3U(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const newChs = parseM3U(evt.target.result);
                channels = newChs.concat(channels);
                saveData();
                render();
                alert(`تم استيراد ${newChs.length} قناة بنجاح!`);
                e.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function removeCh(idx, e) {
            e.stopPropagation();
            channels.splice(idx, 1);
            saveData();
            render();
        }

        function clearAll() {
            if (channels.length === 0) return;
            if (confirm("هل أنت متأكد من مسح جميع القنوات؟")) {
                channels = [];
                saveData();
                render();
                stopStream();
            }
        }

        function exportHTML() {
            if (channels.length === 0) {
                alert("لا توجد قنوات لتصديرها!");
                return;
            }

            const docClone = document.documentElement.cloneNode(true);

            docClone.querySelector('#ch-list').innerHTML = '';
            docClone.querySelector('#np-title span').innerText = 'لم يتم اختيار قناة';
            docClone.querySelector('#ch-count').innerText = '0';
            ['#i-name', '#i-url', '#i-logo'].forEach(id => {
                const el = docClone.querySelector(id);
                if(el) el.removeAttribute('value');
            });

            const wrapper = docClone.querySelector('#player-wrapper');
            wrapper.innerHTML = '<video id="video-player" controls playsinline preload="auto"></video>';

            let htmlString = docClone.outerHTML;
            const jsonStr = JSON.stringify(channels);
            
            htmlString = htmlString.replace(/\/\*\[INJECT_CHANNELS\]\*\/[\s\S]*?\/\*\[\/INJECT_CHANNELS\]\*\//, `/*[INJECT_CHANNELS]*/${jsonStr}/*[/INJECT_CHANNELS]*/`);

            const finalHtml = `<!DOCTYPE html>\n<html lang="ar" dir="rtl">\n${htmlString}\n</html>`;

            const blob = new Blob([finalHtml], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Nova_Stream_Player.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        render();

    </script>

</body></html>
